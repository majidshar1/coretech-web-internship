<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-CRM: Client Management System</title>
    <style>
        /* Professional Dashboard Styling */
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-light: #6b7280;
            --border-color: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.2rem;
            color: var(--primary);
        }

        /* Top Bar: Search */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .search-box {
            padding: 10px 15px;
            width: 300px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
        }

        .search-box:focus {
            border-color: var(--primary);
        }

        /* Layout Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        /* Form Card */
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        .card h2 {
            margin-bottom: 20px;
            font-size: 1.3rem;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover { background-color: var(--primary-hover); }
        .btn-update { background-color: var(--warning); color: #000; }
        .btn-update:hover { background-color: #d97706; }

        /* Table Card */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f9fafb;
            color: var(--text-light);
            font-weight: 600;
            font-size: 0.9rem;
        }

        td { font-size: 0.95rem; }

        /* Status Badges */
        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
        }
        .status-pending { background-color: #fee2e2; color: #dc2626; }
        .status-progress { background-color: #dbeafe; color: #2563eb; }
        .status-completed { background-color: #d1fae5; color: #059669; }

        /* Action Buttons */
        .action-btn {
            padding: 6px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            color: white;
            margin-right: 5px;
        }
        .edit-btn { background-color: var(--warning); color: #000; }
        .delete-btn { background-color: var(--danger); }

        .empty-msg {
            text-align: center;
            padding: 20px;
            color: var(--text-light);
            font-style: italic;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .top-bar { justify-content: center; }
            .search-box { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Client Management Dashboard</h1>
        </div>

        <div class="top-bar">
            <input type="text" id="searchInput" class="search-box" placeholder="Search clients by name or company...">
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <h2 id="formTitle">Add New Client</h2>
                <form id="clientForm">
                    <input type="hidden" id="clientId">
                    
                    <div class="form-group">
                        <label>Client Name</label>
                        <input type="text" id="clientName" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="clientEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" id="clientPhone" required>
                    </div>
                    <div class="form-group">
                        <label>Company Name</label>
                        <input type="text" id="companyName" required>
                    </div>
                    <div class="form-group">
                        <label>Project Type</label>
                        <input type="text" id="projectType" required placeholder="e.g. Web Dev, SEO">
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="clientStatus">
                            <option value="Pending">Pending</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <button type="submit" id="submitBtn" class="btn">Save Client</button>
                </form>
            </div>

            <div class="card">
                <h2>Client Records</h2>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Name & Company</th>
                                <th>Contact Info</th>
                                <th>Project</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="clientTableBody">
                            </tbody>
                    </table>
                    <div id="emptyMsg" class="empty-msg">No clients found. Add a new client to get started.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Professional CRUD Logic with LocalStorage ---

        // DOM Elements
        const form = document.getElementById('clientForm');
        const clientIdInput = document.getElementById('clientId');
        const nameInput = document.getElementById('clientName');
        const emailInput = document.getElementById('clientEmail');
        const phoneInput = document.getElementById('clientPhone');
        const companyInput = document.getElementById('companyName');
        const projectInput = document.getElementById('projectType');
        const statusInput = document.getElementById('clientStatus');
        const submitBtn = document.getElementById('submitBtn');
        const formTitle = document.getElementById('formTitle');
        const tableBody = document.getElementById('clientTableBody');
        const emptyMsg = document.getElementById('emptyMsg');
        const searchInput = document.getElementById('searchInput');

        // State Management
        let clients = JSON.parse(localStorage.getItem('crm_clients')) || [];
        let isEditing = false;

        // 1. READ: Display Data
        function renderClients(data = clients) {
            tableBody.innerHTML = '';
            
            if(data.length === 0) {
                emptyMsg.style.display = 'block';
            } else {
                emptyMsg.style.display = 'none';
                data.forEach(client => {
                    
                    // Determine Badge Class
                    let badgeClass = '';
                    if(client.status === 'Pending') badgeClass = 'status-pending';
                    else if(client.status === 'In Progress') badgeClass = 'status-progress';
                    else if(client.status === 'Completed') badgeClass = 'status-completed';

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>
                            <strong>${client.name}</strong><br>
                            <span style="font-size: 0.8rem; color: #6b7280;">${client.company}</span>
                        </td>
                        <td>
                            ${client.email}<br>
                            <span style="font-size: 0.8rem; color: #6b7280;">${client.phone}</span>
                        </td>
                        <td>${client.project}</td>
                        <td>
                            <span class="badge ${badgeClass}" onclick="toggleStatus(${client.id})" title="Click to change status">${client.status}</span>
                        </td>
                        <td>
                            <button class="action-btn edit-btn" onclick="editClient(${client.id})">Edit</button>
                            <button class="action-btn delete-btn" onclick="deleteClient(${client.id})">Delete</button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            }
        }

        // 2. CREATE & UPDATE: Save Form Data
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const clientData = {
                id: isEditing ? parseInt(clientIdInput.value) : Date.now(),
                name: nameInput.value.trim(),
                email: emailInput.value.trim(),
                phone: phoneInput.value.trim(),
                company: companyInput.value.trim(),
                project: projectInput.value.trim(),
                status: statusInput.value
            };

            if (isEditing) {
                // Update existing
                clients = clients.map(c => c.id === clientData.id ? clientData : c);
                isEditing = false;
                submitBtn.textContent = 'Save Client';
                submitBtn.classList.remove('btn-update');
                formTitle.textContent = 'Add New Client';
            } else {
                // Add new
                clients.push(clientData);
            }

            saveData();
            form.reset();
            renderClients();
        });

        // 3. EDIT: Populate Form
        window.editClient = function(id) {
            const client = clients.find(c => c.id === id);
            if(client) {
                isEditing = true;
                clientIdInput.value = client.id;
                nameInput.value = client.name;
                emailInput.value = client.email;
                phoneInput.value = client.phone;
                companyInput.value = client.company;
                projectInput.value = client.project;
                statusInput.value = client.status;

                submitBtn.textContent = 'Update Client';
                submitBtn.classList.add('btn-update');
                formTitle.textContent = 'Edit Client Record';
                nameInput.focus();
            }
        }

        // 4. DELETE: Remove Client
        window.deleteClient = function(id) {
            if(confirm('Are you sure you want to delete this client?')) {
                clients = clients.filter(c => c.id !== id);
                saveData();
                renderClients();
            }
        }

        // 5. UPDATE STATUS: Quick click toggle
        window.toggleStatus = function(id) {
            const statuses = ['Pending', 'In Progress', 'Completed'];
            clients = clients.map(c => {
                if(c.id === id) {
                    let currentIndex = statuses.indexOf(c.status);
                    let nextIndex = (currentIndex + 1) % statuses.length;
                    return { ...c, status: statuses[nextIndex] };
                }
                return c;
            });
            saveData();
            renderClients();
        }

        // 6. SEARCH functionality
        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const filtered = clients.filter(c => 
                c.name.toLowerCase().includes(term) || 
                c.company.toLowerCase().includes(term)
            );
            renderClients(filtered);
        });

        // Helper: Save to LocalStorage
        function saveData() {
            localStorage.setItem('crm_clients', JSON.stringify(clients));
        }

        // Initialize
        renderClients();
    </script>
</body>
</html>
