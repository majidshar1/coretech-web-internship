<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Directory API - Task 7</title>
    <style>
        /* Professional UI Styling */
        :root {
            --primary-color: #2563eb;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-secondary: #4b5563;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            padding: 40px 20px;
            color: var(--text-main);
        }

        .header-section {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            text-align: center;
        }

        .header-section h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .search-box {
            width: 100%;
            max-width: 500px;
            padding: 15px 20px;
            font-size: 1.1rem;
            border: 2px solid #e5e7eb;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .search-box:focus {
            border-color: var(--primary-color);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        /* Status Messages (Loading & Error) */
        .status-message {
            text-align: center;
            font-size: 1.2rem;
            margin-top: 50px;
            display: none;
        }

        .loading { color: var(--primary-color); font-weight: bold; }
        .error { color: #dc2626; background: #fee2e2; padding: 15px; border-radius: 8px; max-width: 500px; margin: 50px auto; }
        .no-results { color: var(--text-secondary); }

        /* Card Grid Layout */
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .user-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e5e7eb;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .user-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .user-card h3 {
            font-size: 1.4rem;
            margin-bottom: 15px;
            color: var(--text-main);
            border-bottom: 2px solid #f3f4f6;
            padding-bottom: 10px;
        }

        .user-card p {
            margin-bottom: 10px;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .user-card p strong {
            color: var(--text-main);
            display: inline-block;
            width: 80px;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>User Directory</h1>
        <input type="text" id="searchInput" class="search-box" placeholder="Search users by name...">
    </div>

    <div id="loading" class="status-message loading">Fetching user data... Please wait.</div>
    <div id="error" class="status-message error">Failed to load data. Please check your internet connection and try again.</div>
    <div id="noResults" class="status-message no-results">No users found matching your search.</div>

    <div id="usersGrid" class="users-grid"></div>

    <script>
        // --- Professional API Fetch & Filtering Logic ---
        
        const apiUrl = 'https://jsonplaceholder.typicode.com/users';
        const usersGrid = document.getElementById('usersGrid');
        const searchInput = document.getElementById('searchInput');
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const noResultsDiv = document.getElementById('noResults');
        
        let allUsers = []; // Store fetched users globally

        // 1. Fetch Data from API
        async function fetchUsers() {
            try {
                // Show loading state
                loadingDiv.style.display = 'block';
                errorDiv.style.display = 'none';
                usersGrid.innerHTML = '';

                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                allUsers = await response.json(); // Convert response to JSON
                
                // Hide loading and render data
                loadingDiv.style.display = 'none';
                renderUsers(allUsers);

            } catch (error) {
                console.error("Error fetching users:", error);
                loadingDiv.style.display = 'none';
                errorDiv.style.display = 'block'; // Show error handling message
            }
        }

        // 2. Render Cards to the DOM
        function renderUsers(users) {
            usersGrid.innerHTML = ''; // Clear current grid
            
            if (users.length === 0) {
                noResultsDiv.style.display = 'block';
                return;
            }
            
            noResultsDiv.style.display = 'none';

            users.forEach(user => {
                const card = document.createElement('div');
                card.className = 'user-card';
                
                // Extracting required fields: Name, Email, Phone, Website, City
                card.innerHTML = `
                    <h3>${user.name}</h3>
                    <p><strong>Email:</strong> ${user.email}</p>
                    <p><strong>Phone:</strong> ${user.phone}</p>
                    <p><strong>Website:</strong> <a href="http://${user.website}" target="_blank" style="color: #2563eb; text-decoration: none;">${user.website}</a></p>
                    <p><strong>City:</strong> ${user.address.city}</p>
                `;
                
                usersGrid.appendChild(card);
            });
        }

        // 3. Search Filter Logic
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            
            const filteredUsers = allUsers.filter(user => 
                user.name.toLowerCase().includes(searchTerm)
            );
            
            renderUsers(filteredUsers);
        });

        // Initialize the app by fetching data
        fetchUsers();
    </script>

</body>
</html>
